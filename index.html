<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nexus API Portal - Enterprise Microservices</title>
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    body { margin: 0; background: #fafafa; }
    #header { background: #1b1b1b; color: white; padding: 20px; text-align: center; font-family: sans-serif; }
  </style>
</head>
<body>
  <div id="header">
    <h1>🏛️ Nexus API Documentation</h1>
    <p>Enterprise Spring Boot Microservices Platform (Clean Architecture & DDD)</p>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    window.onload = () => {
      window.ui = SwaggerUIBundle({
        url: 'https://saanvirajput.github.io/nexus-backend-platform/openapi.json',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis],
        layout: "BaseLayout"
      });
    };
  </script>
</body>
</html>
